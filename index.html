<!DOCTYPE html>
<html lang="de" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VokaOrbit 🚀</title>

    <!-- Plus Jakarta Sans — Orbit Schriftart -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&display=swap"
      rel="stylesheet"
    />

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html {
        height: 100%;
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        font-family: 'Plus Jakarta Sans', 'DM Sans', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
      }
      /* Smooth Theme-Transition */
      body, body * {
        transition: background-color 0.3s ease, border-color 0.3s ease, color 0.15s ease;
      }
      /* Verhindert Flash beim Laden */
      [data-theme="dark"] body {
        background: #080818;
      }
      [data-theme="light"] body {
        background: #EEF2FF;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
